<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Financial News Summarizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>📰 Financial News Summarizer</h1>
    <p class="subtitle">Paste a financial news article below and get an instant summary.</p>

    <textarea id="articleInput" placeholder="Paste your financial news article here..."></textarea>

    <button id="summarizeBtn" onclick="summarize()">Summarize</button>

    <div id="loading" class="hidden">⏳ Generating summary, please wait...</div>

    <div id="results" class="hidden">
      <div class="result-box">
        <h2>🔵 Extractive Summary <span>(spaCy)</span></h2>
        <p id="extractiveOutput"></p>
      </div>
      <div class="result-box">
        <h2>🟢 Abstractive Summary <span>(BART)</span></h2>
        <p id="abstractiveOutput"></p>
      </div>
      <div class="result-box">
        <h2>📊 ROUGE Scores</h2>
        <pre id="rougeOutput"></pre>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
